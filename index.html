<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantão Noturno - Final de Semana</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --rio-blue: #002D5E;
            --rio-light: #004A8D;
            --accent-bronze: #8C6239;
            --bg-body: #F4F7FA;
            --bg-card: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --bg-annotated: #F0FDF4;
            --border-annotated: #BBF7D0;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background-color: var(--bg-body);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px;
        }
        
        /* Tela de Login */
        .auth-container {
            width: 100%;
            max-width: 400px;
            background: #FFF;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .auth-container h2 { color: var(--rio-blue); text-align: center; margin-bottom: 10px; }
        .auth-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
        }
        .auth-btn {
            width: 100%;
            color: #FFF;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-login { background: var(--rio-blue); }
        .btn-login:hover { background: var(--rio-light); }
        .btn-register { background: #475569; margin-top: 5px; }
        .btn-register:hover { background: #334155; }
        .auth-divider { text-align: center; font-size: 12px; color: var(--text-muted); margin: 5px 0; position: relative; }

        /* Container Principal do Calendário */
        .calendar-container {
            width: 100%;
            max-width: 1000px;
            background-color: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            display: none; 
            flex-direction: column;
            margin-bottom: 20px;
