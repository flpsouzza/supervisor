<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantão Noturno - Final de Semana</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --rio-blue: #002D5E;
            --rio-light: #004A8D;
            --accent-bronze: #8C6239;
            --bg-body: #F4F7FA;
            --bg-card: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --bg-annotated: #F0FDF4;
            --border-annotated: #BBF7D0;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background-color: var(--bg-body);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px;
        }
        
        /* Tela de Login */
        .auth-container {
            width: 100%;
            max-width: 400px;
            background: #FFF;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .auth-container h2 { color: var(--rio-blue); text-align: center; margin-bottom: 10px; }
        .auth-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
        }
        .auth-btn {
            width: 100%;
            color: #FFF;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-login { background: var(--rio-blue); }
        .btn-login:hover { background: var(--rio-light); }
        .btn-register { background: #475569; margin-top: 5px; }
        .btn-register:hover { background: #334155; }
        .auth-divider { text-align: center; font-size: 12px; color: var(--text-muted); margin: 5px 0; position: relative; }

        /* Container Principal do Calendário */
        .calendar-container {
            width: 100%;
            max-width: 1000px;
            background-color: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            display: none; 
            flex-direction: column;
            margin-bottom: 20px;
            position: relative;
        }
        .top-bar-header {
            background-color: var(--rio-blue);
            color: #FFF;
            text-align: center;
            padding: 14px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
        }
        .logout-btn {
            position: absolute;
            right: 14px; top: 11px;
            background: rgba(255,255,255,0.2);
            color: #FFF; border: none;
            padding: 4px 10px; border-radius: 6px;
            font-size: 11px; font-weight: bold; cursor: pointer;
        }
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: #FFF;
            gap: 16px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }
        .title-block { position: relative; width: 100%; }
        .title-block .month-title { font-size: 36px; font-weight: 800; color: var(--rio-blue); text-transform: uppercase; }
        .title-block .year-title { font-size: 15px; color: var(--accent-bronze); font-weight: 700; letter-spacing: 6px; margin-top: 4px; }
        
        .toolbar {
            display: flex; flex-wrap: wrap; gap: 12px; width: 100%; justify-content: center; align-items: center;
            background: #F8FAFC; padding: 14px 20px; border-bottom: 1px solid var(--border-color);
        }
        .nav-controls, .view-controls, .search-control, .jump-control { display: flex; align-items: center; gap: 6px; }
        .toolbar select, .toolbar input { padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 20px; font-size: 13px; background: #FFF; }
        
        .btn-action {
            background-color: #FFF; color: var(--rio-blue); border: 1.5px solid var(--rio-blue);
            padding: 8px 16px; font-size: 12px; font-weight: 700; cursor: pointer; border-radius: 20px; transition: all 0.2s ease; text-transform: uppercase;
        }
        .btn-action:hover, .btn-action.active { background-color: var(--rio-blue); color: #FFF; }
        
        /* Área do Calendário - Permite rolagem horizontal */
        .calendar-content { 
            padding: 12px; 
            width: 100%;
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch;
        }
        /* Aumentado o min-width para 900px para evitar esmagamento no celular */
        .calendar-grid-table { 
            width: 100%; 
            min-width: 900px; 
            border-collapse: separate; 
            border-spacing: 0; 
            table-layout: fixed; 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            overflow: hidden; 
        }
        .calendar-grid-table th { background-color: var(--rio-blue); color: #FFF; font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 10px 4px; text-align: center; }
        .calendar-grid-table td { border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); vertical-align: top; padding: 6px 4px; height: 135px; background-color: #FFF; position: relative; transition: background-color 0.2s, border-color 0.2s; }
        .calendar-grid-table .empty-cell { background-color: #F8FAFC; }
        
        .calendar-grid-table td.annotated-cell { background-color: var(--bg-annotated) !important; border-color: var(--border-annotated) !important; box-shadow: inset 0 0 0 1px var(--border-annotated); }
        .mobile-card.annotated-card { background-color: var(--bg-annotated) !important; border-color: var(--border-annotated) !important; }

        .date-row { display: flex; justify-content: flex-end; margin-bottom: 4px; }
        .date-num { font-weight: 700; font-size: 11px; color: #94A3B8; }
        .duty-day-circle { width: 20px; height: 20px; border: 2px solid var(--rio-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--rio-light); font-size: 10px; font-weight: 800; }
        
        .agenda-input {
            width: 100%; 
            height: 58px; 
            margin-top: 6px; 
            border: 1px solid #CBD5E1; 
            border-radius: 6px;
            resize: none; 
            font-size: 12px; 
            font-weight: 700; 
            padding: 6px; 
            background: #F8FAFC; 
            color: #000000; 
            outline: none; 
            transition: all 0.2s;
            overflow: hidden;
        }
        .agenda-input:hover { border-color: #94A3B8; background: #F1F5F9; }
        .agenda-input:focus { border-color: var(--rio-light); background: #FFF; box-shadow: 0 0 0 2px rgba(0, 45, 94, 0.15); overflow-y: auto; }

        .mobile-list-view { display: none; flex-direction: column; gap: 10px; padding: 8px; width: 100%; }
        .mobile-card { background: #FFF; border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 8px; transition: background-color 0.2s, border-color 0.2s; }
        .mobile-card-header { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .mobile-card-date { display: flex; align-items: center; gap: 8px; }
        .mobile-day-name { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        
        .badges-list { display: flex; flex-direction: column; gap: 3px; width: 100%; }
        .badge { font-size: 9px; font-weight: 800; color: #FFF; padding: 2px 4px; border-radius: 4px; text-transform: uppercase; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .b-julio { background-color: #DC2626; }
        .b-carlos { background-color: #D97706; }
        .b-leticia { background-color: #0891B2; }
        .b-gustavo { background-color: #EA580C; }
        .b-tatiane { background-color: #2563EB; }
        .b-leandro { background-color: #7C3AED; }
        .b-felipe { background-color: #16A34A; }
        
        .today-cell { background-color: #FFFBEB !important; border: 2px solid #F59E0B !important; box-shadow: none !important; }
        .today-card { border: 2px solid #F59E0B !important; background-color: #FFFBEB !important; }
        
        footer { padding: 16px 20px; background-color: #F8FAFC; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .legend-container { display: flex; gap: 14px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .l-dot { width: 10px; height: 10px; border-radius: 50%; }
        .l-active { border: 2px solid var(--rio-light); }
        .l-today { background-color: #FFFBEB; border: 2px solid #F59E0B; }
        .l-annotated { background-color: var(--bg-annotated); border: 1px solid var(--border-annotated); }
        
        @media (max-width: 650px) {
            body { padding: 4px; }
            .toolbar { padding: 12px 10px; gap: 12px; flex-direction: column; }
            .nav-controls, .view-controls, .search-control, .jump-control { width: 100%; justify-content: center; }
            footer { flex-direction: column; gap: 10px; text-align: center; }
            
            /* Ajustes focados apenas na visualização em LISTA no mobile */
            .mobile-card .agenda-input {
                font-size: 14px !important; 
                height: 68px !important; 
                border-color: #94A3B8 !important; 
            }
        }
    </style>
</head>
<body>

    <div class="auth-container" id="auth-screen">
        <h2>Acesso à Escala</h2>
        <input type="email" id="auth-email" class="auth-input" placeholder="Seu e-mail">
        <input type="password" id="auth-password" class="auth-input" placeholder="Sua senha">
        
        <button id="auth-login-btn" class="auth-btn btn-login">Entrar</button>
        <div class="auth-divider">ou se for seu primeiro acesso</div>
        <button id="auth-register-btn" class="auth-btn btn-register">Criar Nova Conta</button>
    </div>

    <div class="calendar-container" id="calendar-screen">
        <div class="top-bar-header">
            Final de Semana
            <button class="logout-btn" id="logout-btn">Sair</button>
        </div>
        <header>
            <div class="title-block">
                <div class="month-title" id="month-label">Julho</div>
                <div class="year-title" id="year-label">2026</div>
            </div>
        </header>

        <div class="toolbar">
            <div class="nav-controls">
                <button class="btn-action" id="btn-prev-month">« Ant</button>
                <button class="btn-action" id="btn-next-month">Próx »</button>
            </div>
            <div class="view-controls">
                <button class="btn-action active" id="view-grid-btn">Calendário</button>
                <button class="btn-action" id="view-list-btn">Lista</button>
            </div>
            <div class="jump-control">
                <select id="jump-month-select">
                    <option value="0">Janeiro</option><option value="1">Fevereiro</option><option value="2">Março</option>
                    <option value="3">Abril</option><option value="4">Maio</option><option value="5">Junho</option>
                    <option value="6" selected>Julho</option><option value="7">Agosto</option><option value="8">Setembro</option>
                    <option value="9">Outubro</option><option value="10">Novembro</option><option value="11">Dezembro</option>
                </select>
                <select id="jump-year-select"></select>
                <button class="btn-action" id="jump-submit-btn">Ir</button>
            </div>
        </div>

        <div class="calendar-content">
            <table class="calendar-grid-table" id="main-grid-view">
                <thead><tr><th>Dom</th><th>Seg</th><th>Ter</th><th>Qua</th><th>Qui</th><th>Sex</th><th>Sáb</th></tr></thead>
                <tbody id="calendar-table-body"></tbody>
            </table>
            <div class="mobile-list-view" id="main-list-view"></div>
        </div>

        <footer>
            <div class="legend-container">
                <div class="legend-item"><div class="l-dot l-active"></div> Plantão</div>
                <div class="legend-item"><div class="l-dot l-today"></div> Hoje</div>
                <div class="legend-item"><div class="l-dot l-annotated"></div> Com Anotação</div>
            </div>
            <span class="credit-footer">Desenvolvido por <strong>Felipe Souza</strong></span>
        </footer>
    </div>

    <script>
        const SUPABASE_URL = "https://hxnjejonbyzeovlziunq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_kOZ8xbE5i3-s9cNr3vj0qg_DYRXc15V"; 
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let sessionUser = null;
        let notesCache = {}; 
        const monthNamesList = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        const dayNamesList = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
        const staffRotationList = ["Júlio","Carlos","Leticia","Gustavo","Tatiane"];
        let activeMonth = 6, activeYear = 2026, currentViewMode = "grid";

        const yearSelect = document.getElementById("jump-year-select");
        if (yearSelect) {
            for (let y=2026; y<=2035; y++) {
                let opt = document.createElement("option"); opt.value = y; opt.innerText = y;
                yearSelect.appendChild(opt);
            }
        }

        const authScreen = document.getElementById("auth-screen");
        const calendarScreen = document.getElementById("calendar-screen");
        const loginBtn = document.getElementById("auth-login-btn");
        const registerBtn = document.getElementById("auth-register-btn");

        loginBtn.onclick = async () => {
            const email = document.getElementById("auth-email").value.trim();
            const password = document.getElementById("auth-password").value;
            if(!email || !password) return alert("Preencha todos os campos!");

            loginBtn.innerText = "Carregando...";
            loginBtn.disabled = true;

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    alert("Erro do Supabase: " + error.message);
                }
            } catch(err) {
                alert("Falha na conexão: " + err.message);
            } finally {
                loginBtn.innerText = "Entrar";
                loginBtn.disabled = false;
            }
        };

        registerBtn.onclick = async () => {
            const email = document.getElementById("auth-email").value.trim();
            const password = document.getElementById("auth-password").value;
            if(!email || !password) return alert("Preencha o e-mail e a senha que deseja cadastrar!");
            if(password.length < 6) return alert("A senha precisa ter pelo menos 6 caracteres!");

            registerBtn.innerText = "Cadastrando...";
            registerBtn.disabled = true;

            try {
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if (error) {
                    alert("O banco recusou o cadastro: " + error.message);
                } else {
                    alert("Conta criada com sucesso! Tente realizar o login agora.");
                }
            } catch (err) {
                alert("Falha ao tentar cadastrar: " + err.message);
            } finally {
                registerBtn.innerText = "Criar Nova Conta";
                registerBtn.disabled = false;
            }
        };

        if (document.getElementById("logout-btn")) {
            document.getElementById("logout-btn").onclick = async () => {
                await supabaseClient.auth.signOut();
                localStorage.clear(); 
                window.location.reload();
            };
        }

        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                sessionUser = session.user;
                if(authScreen) authScreen.style.display = "none";
                if(calendarScreen) calendarScreen.style.display = "flex";
                loadNotesFromServer();
            } else {
                sessionUser = null;
                if(authScreen) authScreen.style.display = "flex";
                if(calendarScreen) calendarScreen.style.display = "none";
            }
        });

        function calculateDaysFromAnchor(y,m,d) {
            const anchor = Date.UTC(2026,6,3);
            const target = Date.UTC(y,m,d);
            return Math.floor((target - anchor) / (1000*60*60*24));
        }
        function mathematicalMod(n,m) { return ((n%m)+m)%m; }
        function cleanStringForClass(text) { return text.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase(); }

        function getWorkersForDate(year, month, day) {
            let activeWorkers = [], isDuty = false;
            const diff = calculateDaysFromAnchor(year, month, day);
            const pos = mathematicalMod(diff, 14);
            if (pos === 0 || pos === 1 || pos === 2) {
                isDuty = true;
                let weekendIdx = Math.floor((diff - (pos===0?0:pos===1?1:2)) / 14);
                const offset = mathematicalMod(weekendIdx*2, 5);
                const order = staffRotationList.slice(offset).concat(staffRotationList.slice(0,offset));
                if (pos===0) activeWorkers.push(order[0], order[1]);
                else if (pos===1) activeWorkers.push("Felipe", order[2]);
                else if (pos===2) activeWorkers.push(order[3], order[4]);
            } else if (pos === 6) {
                isDuty = true;
                activeWorkers.push("Leandro");
            }
            return { isDuty, activeWorkers };
        }

        async function loadNotesFromServer() {
            if(!sessionUser) return;
            try {
                const { data, error } = await supabaseClient.from('escala_agenda').select('data_chave, nota');
                if (!error && data) {
                    notesCache = {};
                    data.forEach(item => { notesCache[item.data_chave] = item.nota; });
                    buildCalendar();
                }
            } catch(e) {}
        }

        let saveTimeout;
        function saveNoteToServer(dayNum, text) {
            const key = `${activeYear}_${activeMonth}_${dayNum}`;
            notesCache[key] = text;

            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                try {
                    await supabaseClient.from('escala_agenda').upsert({
                        user_id: sessionUser.id,
                        data_chave: key,
                        nota: text
                    }, { onConflict: 'user_id,data_chave' });
                } catch(e) {}
            }, 500); 
        }

        async function replicateNoteInBulk(startDay, text) {
            const isEmpty = !text.trim();
            let promptMsg = "";
            
            if (isEmpty) {
                promptMsg = "O campo está vazio. Digite a quantidade de dias corridos para a frente (incluindo hoje) que você deseja APAGAR/LIMPAR:";
            } else {
                promptMsg = "Deseja REPLICAR esta anotação por quantos dias corridos para frente (incluindo hoje)?";
            }
            
            const promptDays = prompt(promptMsg, "10");
            if (!promptDays) return;
            
            const totalDaysToApply = parseInt(promptDays);
            if (isNaN(totalDaysToApply) || totalDaysToApply <= 0) return alert("Por favor, digite um número de dias válido.");

            let currentDateObj = new Date(activeYear, activeMonth, startDay);
            let upsertArray = [];

            for (let i = 0; i < totalDaysToApply; i++) {
                const targetYear = currentDateObj.getFullYear();
                const targetMonth = currentDateObj.getMonth();
                const targetDay = currentDateObj.getDate();
                const key = `${targetYear}_${targetMonth}_${targetDay}`;

                notesCache[key] = text;

                upsertArray.push({
                    user_id: sessionUser.id,
                    data_chave: key,
                    nota: text
                });

                currentDateObj.setDate(currentDateObj.getDate() + 1);
            }

            try {
                const { error } = await supabaseClient.from('escala_agenda').upsert(upsertArray, { onConflict: 'user_id,data_chave' });
                if (error) {
                    alert("Erro ao atualizar o banco: " + error.message);
                } else {
                    buildCalendar();
                    alert(isEmpty ? "Anotações apagadas com sucesso!" : "Anotações replicadas com sucesso!");
                }
            } catch (err) {
                alert("Falha na conexão de rede: " + err.message);
            }
        }

        function buildCalendar() {
            const firstDay = new Date(activeYear, activeMonth, 1).getDay();
            const daysInMonth = new Date(activeYear, activeMonth+1, 0).getDate();
            const today = new Date();
            
            if(document.getElementById("month-label")) document.getElementById("month-label").innerText = monthNamesList[activeMonth];
            if(document.getElementById("year-label")) document.getElementById("year-label").innerText = activeYear;

            const tbody = document.getElementById("calendar-table-body");
            const listView = document.getElementById("main-list-view");
            if(!tbody) return;
            
            tbody.innerHTML = ""; 
            if(listView) listView.innerHTML = "";
            let dayNum = 1;

            for (let w=0; w<6; w++) {
                let tr = document.createElement("tr");
                let hasData = false;
                for (let d=0; d<7; d++) {
                    let td = document.createElement("td");
                    if ((w===0 && d<firstDay) || dayNum > daysInMonth) {
                        td.className = "empty-cell";
                    } else {
                        hasData = true;
                        const isToday = (dayNum === today.getDate() && activeYear === today.getFullYear() && activeMonth === today.getMonth());
                        if (isToday) td.className = "today-cell";
                        
                        const currentDayNum = dayNum; 
                        const { isDuty, activeWorkers } = getWorkersForDate(activeYear, activeMonth, currentDayNum);
                        const savedNote = notesCache[`${activeYear}_${activeMonth}_${currentDayNum}`] || "";

                        if (savedNote.trim() && !isToday) {
                            td.classList.add("annotated-cell");
                        }

                        let html = `<div class="date-row">`;
                        html += isDuty ? `<div class="duty-day-circle">${currentDayNum}</div>` : `<div class="date-num">${currentDayNum}</div>`;
                        html += `</div><div class="badges-list">`;
                        activeWorkers.forEach(w => html += `<span class="badge b-${cleanStringForClass(w)}">${w}</span>`);
                        html += `</div>`;
                        html += `<textarea class="agenda-input" data-day="${currentDayNum}" placeholder="Anotar..." title="Duplo clique para replicar. Se vazio, apaga.">${savedNote}</textarea>`;
                        td.innerHTML = html;

                        const tx = td.querySelector('.agenda-input');
                        
                        tx.oninput = (e) => {
                            const val = e.target.value;
                            saveNoteToServer(currentDayNum, val);
                            if (val.trim()) { if(!isToday) td.classList.add("annotated-cell"); } 
                            else { td.classList.remove("annotated-cell"); }
                        };
                        
                        tx.ondblclick = (e) => {
                            replicateNoteInBulk(currentDayNum, e.target.value);
                        };

                        if (listView) {
                            let card = document.createElement("div");
                            card.className = `mobile-card ${isToday ? 'today-card' : ''}`;
                            
                            if (savedNote.trim() && !isToday) {
                                card.classList.add("annotated-card");
                            }

                            card.innerHTML = `
                                <div class="mobile-card-header">
                                    <div class="mobile-card-date">
                                        <div class="mobile-day-name">${dayNamesList[d]}</div>
                                        <div class="duty-day-circle">${currentDayNum}</div>
                                    </div>
                                    <div class="badges-list"></div>
                                </div>
                                <textarea class="agenda-input" placeholder="Anotar...">${savedNote}</textarea>
                            `;
                            const bList = card.querySelector('.badges-list');
                            activeWorkers.forEach(w => bList.innerHTML += `<span class="badge b-${cleanStringForClass(w)}">${w}</span>`);
                            
                            const mobileTx = card.querySelector('.agenda-input');
                            
                            mobileTx.oninput = (e) => {
                                const val = e.target.value;
                                saveNoteToServer(currentDayNum, val);
                                
                                if (val.trim()) { if(!isToday) card.classList.add("annotated-card"); } 
                                else { card.classList.remove("annotated-card"); }

                                const desktopTx = tbody.querySelector(`textarea[data-day="${currentDayNum}"]`);
                                if(desktopTx) {
                                    desktopTx.value = val;
                                    const parentTd = desktopTx.closest('td');
                                    if(parentTd && !isToday) {
                                        if (val.trim()) parentTd.classList.add("annotated-cell");
                                        else parentTd.classList.remove("annotated-cell");
                                    }
                                }
                            };

                            mobileTx.ondblclick = (e) => {
                                replicateNoteInBulk(currentDayNum, e.target.value);
                            };

                            listView.appendChild(card);
                        }
                        dayNum++;
                    }
                    tr.appendChild(td);
                }
                if (hasData) tbody.appendChild(tr);
                if (dayNum > daysInMonth) break;
            }
        }

        if(document.getElementById("view-grid-btn")) {
            document.getElementById("view-grid-btn").onclick = () => { currentViewMode="grid"; document.getElementById("main-grid-view").style.display = "table"; document.getElementById("main-list-view").style.display = "none"; };
        }
        if(document.getElementById("view-list-btn")) {
            document.getElementById("view-list-btn").onclick = () => { currentViewMode="list"; document.getElementById("main-grid-view").style.display = "none"; document.getElementById("main-list-view").style.display = "flex"; };
        }
        if(document.getElementById("btn-prev-month")) {
            document.getElementById("btn-prev-month").onclick = () => { activeMonth--; if(activeMonth<0){activeMonth=11;activeYear--;} buildCalendar(); };
        }
        if(document.getElementById("btn-next-month")) {
            document.getElementById("btn-next-month").onclick = () => { activeMonth++; if(activeMonth>11){activeMonth=0;activeYear++;} buildCalendar(); };
        }
        if(document.getElementById("jump-submit-btn")) {
            document.getElementById("jump-submit-btn").onclick = () => { activeMonth=parseInt(document.getElementById("jump-month-select").value); activeYear=parseInt(document.getElementById("jump-year-select").value); buildCalendar(); };
        }
    </script>
</body>
</html>
